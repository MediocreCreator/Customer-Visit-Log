<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Call Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial, sans-serif; background:#1e1e2f; color:#fff; margin:0; }
.container { max-width:420px; margin:auto; padding:12px; }
h2 { text-align:center; margin-bottom:10px; font-size:20px; }

.form-group { margin-bottom:8px; }
label { font-size:13px; opacity:0.8; }

input, textarea {
  width:100%; padding:8px; border-radius:6px; border:none; font-size:14px; margin-top:3px;
}

textarea { min-height:60px; }

button { width:100%; padding:10px; border:none; border-radius:8px; font-size:14px; margin-top:6px; background:#4CAF50; color:#fff; }

.button-row { display:flex; gap:6px; }
.button-row button { flex:1; }

.tasks { display:grid; grid-template-columns:1fr 1fr; gap:5px; font-size:13px; }

canvas { background:#fff; border-radius:8px; width:100%; height:130px; margin-top:6px; }

.log { background:#111; padding:10px; margin-top:10px; border-radius:8px; font-size:12px; }
img { max-width:100%; margin-top:5px; border-radius:6px; }
.logo { max-height:40px; }
.delete-btn { background:#c0392b; }
</style>
</head>
<body>

<div class="container">
<h2>Customer Call Sheet</h2>

<div class="form-group">
<label>Customer</label>
<input id="customer" />
</div>

<div class="form-group">
<label>Customer Logo</label>
<input type="file" id="logo" accept="image/*" />
</div>

<div class="form-group">
<label>Tasks Performed</label>
<div class="tasks">
<label><input type="checkbox" value="Panel Repair"> Panel Repair</label>
<label><input type="checkbox" value="Primer"> Primer</label>
<label><input type="checkbox" value="Body Filler"> Body Filler</label>
<label><input type="checkbox" value="Sanding"> Sanding</label>
<label><input type="checkbox" value="Spray Painting"> Spray Painting</label>
<label><input type="checkbox" value="Assistance"> Assistance</label>
<label><input type="checkbox" value="Color Matching"> Color Match</label>
<label><input type="checkbox" value="Polishing"> Polishing</label>
<label><input type="checkbox" value="Paint Room"> Paint Room</label>
<label><input type="checkbox" value="Booth Maintenance"> Booth</label>
<label><input type="checkbox" value="PC Updates"> PC</label>
<label><input type="checkbox" value="Software Updates"> Software</label>
</div>
</div>

<div class="form-group">
<label>Notes</label>
<textarea id="notes"></textarea>
</div>

<div class="button-row">
<button onclick="startVisit()">Start</button>
<button onclick="endVisit()">End</button>
</div>

<!-- Photo upload restored here -->
<div class="form-group">
<label>Photo</label>
<input type="file" id="photo" accept="image/*" />
</div>

<button onclick="captureLocation()">Location</button>

<div class="form-group">
<label>Signature</label>
<canvas id="signature"></canvas>
<button onclick="clearSignature()">Clear</button>
</div>

<button onclick="saveLog()">Save</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="logs"></div>
</div>

<script>
let logs = JSON.parse(localStorage.getItem('logs')) || [];
let startTime = null, endTime = null, visitLocation = '', logo = '', photo = '';

function startVisit(){ startTime = new Date(); }
function endVisit(){ endTime = new Date(); }

function getDuration(){
 if(!startTime || !endTime) return '';
 const diff = (endTime - startTime)/1000;
 const h = Math.floor(diff/3600);
 const m = Math.floor((diff%3600)/60);
 return `${h}h ${m}m`;
}

function captureLocation(){
 navigator.geolocation.getCurrentPosition(p=>{
  visitLocation = p.coords.latitude+','+p.coords.longitude;
 });
}

// logo

document.getElementById('logo').addEventListener('change', e=>{
 const file = e.target.files[0];
 if(!file) return;
 const reader = new FileReader();
 reader.onload = ()=> logo = reader.result;
 reader.readAsDataURL(file);
});

// photo (restored)
document.getElementById('photo').addEventListener('change', e=>{
 const file = e.target.files[0];
 if(!file) return;
 const reader = new FileReader();
 reader.onload = ()=> photo = reader.result;
 reader.readAsDataURL(file);
});

// signature
const canvas = document.getElementById('signature');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
let drawing=false;
canvas.addEventListener('touchstart', e=>{ drawing=true; ctx.beginPath(); draw(e); });
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', ()=> drawing=false);

function draw(e){
 if(!drawing) return;
 e.preventDefault();
 const r = canvas.getBoundingClientRect();
 const t = e.touches[0];
 const x = t.clientX - r.left;
 const y = t.clientY - r.top;
 ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#000';
 ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);
}

function clearSignature(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }

function getTasks(){
 return [...document.querySelectorAll('.tasks input:checked')].map(i=>i.value);
}

function saveLog(){
 const log = {
  customer: customer.value,
  tasks: getTasks(),
  notes: notes.value,
  start: startTime,
  end: endTime,
  duration: getDuration(),
  location: visitLocation,
  logo,
  photo,
  signature: canvas.toDataURL()
 };
 logs.push(log);
 localStorage.setItem('logs', JSON.stringify(logs));
 displayLogs();
}

function displayLogs(){
 const div = document.getElementById('logs');
 div.innerHTML='';
 logs.forEach((l,i)=>{
  div.innerHTML += `
   <div class="log">
    ${l.logo ? `<img class="logo" src="${l.logo}"/>` : ''}
    <b>${l.customer}</b><br>
    🔧 ${l.tasks.join(', ')}<br>
    📝 ${l.notes}<br>
    ⏱️ ${l.duration}<br>
    ${l.location ? `📍 ${l.location}<br>` : ''}
    ${l.photo ? `<img src="${l.photo}" />` : ''}
    <img src="${l.signature}" />
    <button class="delete-btn" onclick="deleteLog(${i})">Delete</button>
   </div>`;
 });
}

function deleteLog(i){ logs.splice(i,1); localStorage.setItem('logs', JSON.stringify(logs)); displayLogs(); }

function exportPDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();
 let y=10;
 logs.forEach(l=>{
  if(l.logo) doc.addImage(l.logo,'PNG',10,y,30,10);
  y+=12;
  doc.setFontSize(12);
  doc.text(`Customer: ${l.customer}`,10,y); y+=6;
  doc.text(`Tasks: ${l.tasks.join(', ')}`,10,y); y+=6;
  doc.text(`Notes: ${l.notes}`,10,y); y+=6;
  doc.text(`Time Spent: ${l.duration}`,10,y); y+=6;
  if(l.signature) doc.addImage(l.signature,'PNG',10,y,50,20);
  y+=30;
  if(y>260){ doc.addPage(); y=10; }
 });
 doc.save('CallSheet.pdf');
}

(function test(){
 console.assert(typeof getDuration==='function','duration missing');
 console.assert(typeof getTasks==='function','tasks missing');
})();

displayLogs();
</script>

</body>
</html>
