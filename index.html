<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Call Sheet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background:#1e1e2f;
  color:#fff;
  margin:0;
}

.container {
  width:100%;
  max-width:420px;
  margin:auto;
  padding:16px 12px 20px;
}

h2 { text-align:center; margin-bottom:12px; }

.form-group { margin-bottom:10px; }

input, textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:4px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:#4CAF50;
  color:#fff;
}

.button-row { display:flex; gap:8px; }
.button-row button { flex:1; }

.tasks {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

canvas {
  background:#fff;
  border-radius:10px;
  width:100%;
  height:150px;
  touch-action:none;
}

.log {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img { max-width:100%; border-radius:8px; margin-top:6px; }
.logo { max-height:40px; }
.delete-btn { background:#c0392b; }

/* PDF MODAL */
.pdf-modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:9999;
}

.pdf-header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.pdf-header button {
  width:auto;
  padding:8px 12px;
}

#pdfFrame {
  flex:1;
  width:100%;
  border:none;
  background:#fff;
  -webkit-overflow-scrolling: touch;
}
</style>
</head>

<body>

<div class="container">
<h2>Customer Call Sheet</h2>

<input id="customer" placeholder="Customer" />
<input type="file" id="logo" accept="image/*" />

<div class="tasks">
<label><input type="checkbox" value="Panel Repair"> Panel Repair</label>
<label><input type="checkbox" value="Primer"> Primer</label>
<label><input type="checkbox" value="Body Filler"> Body Filler</label>
<label><input type="checkbox" value="Sanding"> Sanding</label>
<label><input type="checkbox" value="Spray Painting"> Spray Painting</label>
<label><input type="checkbox" value="Assistance"> Assistance</label>
<label><input type="checkbox" value="Color Matching"> Color Match</label>
<label><input type="checkbox" value="Polishing"> Polishing</label>
</div>

<textarea id="notes" placeholder="Notes"></textarea>

<div class="button-row">
<button onclick="startVisit()">Start</button>
<button onclick="endVisit()">End</button>
</div>

<input type="file" id="photo" accept="image/*" />
<button onclick="captureLocation()">Location</button>

<canvas id="signature"></canvas>
<button onclick="clearSignature()">Clear</button>

<button onclick="saveLog()">Save</button>
<button onclick="previewPDF()">Preview PDF</button>

<div id="logs"></div>
</div>

<!-- PDF MODAL -->
<div id="pdfModal" class="pdf-modal">
  <div class="pdf-header">
    <button onclick="closePDF()">Close</button>
    <button onclick="downloadPDF()">Download</button>
  </div>
  <iframe id="pdfFrame"></iframe>
</div>

<script>
let logs = JSON.parse(localStorage.getItem('logs')) || [];
let startTime=null, endTime=null, visitLocation='';
let logo='', photo='';
let currentPDFBlob=null;

const canvas = document.getElementById('signature');
const ctx = canvas.getContext('2d');

/* FIX SIGNATURE DISAPPEARING */
function resizeCanvas(){
  const data = canvas.toDataURL();

  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();

  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,rect.width,rect.height);

  const img = new Image();
  img.src = data;
  img.onload = () => ctx.drawImage(img,0,0,rect.width,rect.height);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* DRAW */
let drawing=false;

canvas.addEventListener('pointerdown', e=>{
  drawing=true;
  ctx.beginPath();
  draw(e);
});

canvas.addEventListener('pointermove', draw);
canvas.addEventListener('pointerup', ()=>drawing=false);
canvas.addEventListener('pointerleave', ()=>drawing=false);

function draw(e){
  if(!drawing) return;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  ctx.lineWidth=2;
  ctx.lineCap='round';
  ctx.strokeStyle='#000';

  ctx.lineTo(x,y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y);
}

function clearSignature(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  resizeCanvas();
}

/* HELPERS */
function checkPageSpace(doc, y, needed=20){
  const h = doc.internal.pageSize.getHeight();
  if(y + needed > h - 10){
    doc.addPage();
    return 15;
  }
  return y;
}

/* LOGIC */
function startVisit(){ startTime=new Date(); }
function endVisit(){ endTime=new Date(); }

function getDuration(){
  if(!startTime||!endTime) return '';
  const diff=(endTime-startTime)/1000;
  return `${Math.floor(diff/3600)}h ${Math.floor((diff%3600)/60)}m`;
}

function captureLocation(){
  navigator.geolocation?.getCurrentPosition(p=>{
    visitLocation=`${p.coords.latitude},${p.coords.longitude}`;
  });
}

function getTasks(){
  return [...document.querySelectorAll('.tasks input:checked')].map(i=>i.value);
}

function handleImageUpload(input, setter){
  input.onchange = e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=> setter(reader.result);
    reader.readAsDataURL(file);
  };
}

handleImageUpload(document.getElementById('logo'), v=>logo=v);
handleImageUpload(document.getElementById('photo'), v=>photo=v);

function saveLog(){
  logs.push({
    customer: customer.value,
    tasks: getTasks(),
    notes: notes.value,
    duration: getDuration(),
    location: visitLocation,
    logo, photo,
    signature: canvas.toDataURL()
  });

  localStorage.setItem('logs', JSON.stringify(logs));
  displayLogs();
}

function displayLogs(){
  const div=document.getElementById('logs');
  div.innerHTML = logs.map((l,i)=>`
    <div class="log">
      ${l.logo ? `<img class="logo" src="${l.logo}">` : ''}
      <b>${l.customer}</b><br>
      🔧 ${l.tasks.join(', ')}<br>
      📝 ${l.notes}<br>
      ⏱️ ${l.duration}<br>
      ${l.location ? `📍 ${l.location}<br>` : ''}
      ${l.photo ? `<img src="${l.photo}">` : ''}
      <img src="${l.signature}">
      <button class="delete-btn" onclick="deleteLog(${i})">Delete</button>
    </div>
  `).join('');
}

function deleteLog(i){
  logs.splice(i,1);
  localStorage.setItem('logs', JSON.stringify(logs));
  displayLogs();
}

/* PDF */
async function previewPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });

  let y=15;
  const margin=10;
  const pageWidth=doc.internal.pageSize.getWidth();

  async function addImageSafe(src,x,yPos,w,h){
    if(!src) return;
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{ doc.addImage(img,'PNG',x,yPos,w,h); resolve(); };
      img.onerror=resolve;
      img.src=src;
    });
  }

  for(const l of logs){

    doc.setFontSize(14);
    doc.text(`Customer: ${l.customer}`,margin,y);
    y+=8;

    doc.text(`Time: ${l.duration}`,margin,y);
    y+=8;

    y = checkPageSpace(doc,y);

    doc.text(`Tasks: ${l.tasks.join(', ')}`,margin,y);
    y+=10;

    doc.text(`Notes: ${l.notes}`,margin,y);
    y+=10;

    if(l.photo){
      const img=new Image();
      img.src=l.photo;
      await new Promise(r=>img.onload=r);

      const maxW=pageWidth-margin*2;
      const ratio=img.height/img.width;
      const h=maxW*ratio;

      y = checkPageSpace(doc,y,h);

      await addImageSafe(l.photo,margin,y,maxW,h);
      y+=h+5;
    }

    if(l.signature){
      y = checkPageSpace(doc,y,40);

      doc.text("Signature:",margin,y);
      y+=5;

      await addImageSafe(l.signature,margin,y,pageWidth/2,30);
      y+=35;
    }

    y = checkPageSpace(doc,y);
  }

  const blob=doc.output('blob');
  currentPDFBlob=blob;

  const url=URL.createObjectURL(blob);
  document.getElementById('pdfFrame').src=url;
  document.getElementById('pdfModal').style.display='flex';
}

function closePDF(){
  document.getElementById('pdfModal').style.display='none';
}

function downloadPDF(){
  if(!currentPDFBlob) return;
  const url=URL.createObjectURL(currentPDFBlob);
  const a=document.createElement('a');
  a.href=url;
  a.download="Customer_Call_Sheet.pdf";
  a.click();
}

displayLogs();
</script>

</body>
</html>
